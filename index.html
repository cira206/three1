<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>THREE O'CLOCK — Lời Cảm Ơn</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f5f2; --surface: #ffffff; --border: #e8e4de;
      --text: #1a1714; --muted: #8a8580; --accent: #2c2420;
      --gold: #c8a96e; --gold-light: #f0e6d3;
      --danger: #c0392b; --success: #27ae60;
      --radius: 12px; --shadow: 0 2px 20px rgba(0,0,0,0.07);
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    #app { display: flex; flex-direction: column; min-height: 100vh; }

    /* NAVBAR */
    .navbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 32px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .brand { font-family: 'DM Serif Display', serif; font-size: 20px; letter-spacing: 0.04em; color: var(--accent); }
    .brand span { color: var(--gold); }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .nav-user { font-size: 14px; color: var(--muted); }
    .nav-user strong { color: var(--text); }
    .main { flex: 1; max-width: 900px; margin: 0 auto; width: 100%; padding: 40px 24px; }

    /* AUTH */
    .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: var(--shadow); }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo h1 { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--accent); letter-spacing: 0.06em; }
    .auth-logo h1 span { color: var(--gold); }
    .auth-logo p { font-size: 13px; color: var(--muted); margin-top: 6px; }
    .auth-tabs { display: flex; background: var(--bg); border-radius: 10px; padding: 4px; margin-bottom: 28px; }
    .auth-tab { flex: 1; padding: 10px; text-align: center; font-size: 14px; font-weight: 500; border-radius: 8px; cursor: pointer; transition: all 0.2s; color: var(--muted); border: none; background: none; font-family: inherit; }
    .auth-tab.active { background: var(--surface); color: var(--accent); box-shadow: 0 1px 6px rgba(0,0,0,0.1); }

    /* FORMS */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px;
      font-size: 14px; font-family: inherit; background: var(--bg); color: var(--text);
      transition: border-color 0.2s; outline: none;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--gold); background: var(--surface); }
    .form-group textarea { resize: vertical; min-height: 90px; }

    /* BUTTONS */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; font-family: inherit; }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; }
    .btn-primary:hover { background: #3d3530; transform: translateY(-1px); }
    .btn-gold { background: var(--gold); color: #fff; }
    .btn-gold:hover { background: #b8994e; transform: translateY(-1px); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--accent); }
    .btn-danger { background: transparent; border: 1px solid #f0c0bd; color: var(--danger); font-size: 13px; padding: 8px 16px; }
    .btn-danger:hover { background: #fdf2f2; }
    .btn-approve { background: #f0faf4; color: var(--success); border: 1px solid #b8e8cc; font-size: 13px; padding: 8px 16px; }
    .btn-approve:hover { background: #d4f0e0; }
    .btn-sm { padding: 8px 16px; font-size: 13px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

    /* ALERTS */
    .alert { padding: 12px 16px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; }
    .alert-error { background: #fdf2f2; color: var(--danger); border: 1px solid #f0c0bd; }
    .alert-success { background: #f0faf4; color: var(--success); border: 1px solid #b8e8cc; }
    .alert-info { background: var(--gold-light); color: #7a5c2a; border: 1px solid #e8d4aa; }

    /* HOME */
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
    .page-header h2 { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--accent); }
    .page-header p { font-size: 14px; color: var(--muted); margin-top: 4px; }

    /* COMPOSE */
    .compose-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 32px; box-shadow: var(--shadow); }
    .compose-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 20px; color: var(--accent); }
    .recipient-select { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-height: 200px; overflow-y: auto; border: 1px solid var(--border); border-radius: 10px; padding: 8px; background: var(--bg); }
    .recipient-chip { padding: 8px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; display: flex; align-items: center; gap: 8px; }
    .recipient-chip:hover { background: var(--gold-light); border-color: var(--gold); }
    .recipient-chip.selected { background: var(--gold-light); border-color: var(--gold); font-weight: 600; }
    .recipient-chip.already-thanked { opacity: 0.4; cursor: not-allowed; }
    .avatar-xs { width: 26px; height: 26px; border-radius: 50%; background: var(--gold); color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .img-upload-area { border: 2px dashed var(--border); border-radius: 10px; padding: 24px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--bg); }
    .img-upload-area:hover { border-color: var(--gold); background: var(--gold-light); }
    .img-upload-area p { font-size: 13px; color: var(--muted); }
    .img-preview { max-height: 160px; border-radius: 10px; margin-top: 12px; }

    /* FEED */
    .feed { display: flex; flex-direction: column; gap: 16px; }
    .thank-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); animation: fadeUp 0.3s ease; }
    .thank-card:hover { box-shadow: 0 4px 30px rgba(0,0,0,0.1); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .card-people { display: flex; align-items: center; gap: 12px; }
    .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--gold); color: #fff; font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .card-names { font-size: 13px; }
    .card-names .from-n { font-weight: 600; color: var(--text); }
    .card-names .arrow { color: var(--gold); margin: 0 6px; }
    .card-names .to-n { font-weight: 600; color: var(--accent); }
    .card-time { font-size: 12px; color: var(--muted); }
    .card-message { font-size: 15px; line-height: 1.7; color: var(--text); margin-bottom: 14px; padding: 16px; background: var(--bg); border-radius: 10px; border-left: 3px solid var(--gold); }
    .card-img { width: 100%; max-height: 300px; object-fit: cover; border-radius: 10px; margin-bottom: 14px; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 12px; border-top: 1px solid var(--border); }
    .card-branch { font-size: 12px; color: var(--muted); background: var(--bg); padding: 4px 10px; border-radius: 20px; }
    .thank-card.deleted { opacity: 0.5; background: #fdf2f2; border-color: #f0c0bd; }
    .deleted-notice { font-size: 13px; color: var(--danger); font-style: italic; padding: 8px 12px; background: #fff0ee; border-radius: 8px; margin-top: 8px; }

    /* ADMIN */
    .tabs { display: flex; gap: 4px; background: var(--bg); border-radius: 12px; padding: 4px; margin-bottom: 28px; width: fit-content; }
    .tab { padding: 10px 20px; font-size: 14px; font-weight: 500; border-radius: 9px; cursor: pointer; transition: all 0.2s; color: var(--muted); border: none; background: none; font-family: inherit; }
    .tab.active { background: var(--surface); color: var(--accent); box-shadow: 0 1px 6px rgba(0,0,0,0.1); }
    .pending-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; animation: fadeUp 0.3s ease; }
    .pending-info h4 { font-size: 15px; font-weight: 600; }
    .pending-info p { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .pending-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; box-shadow: var(--shadow); }
    .stat-card .num { font-family: 'DM Serif Display', serif; font-size: 36px; color: var(--accent); line-height: 1; }
    .stat-card .label { font-size: 13px; color: var(--muted); margin-top: 6px; }
    .leaderboard { display: flex; flex-direction: column; gap: 10px; }
    .leader-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; display: flex; align-items: center; gap: 16px; animation: fadeUp 0.3s ease; }
    .leader-rank { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--gold); width: 32px; text-align: center; flex-shrink: 0; }
    .leader-bar-wrap { flex: 1; }
    .leader-name { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
    .leader-bar-bg { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
    .leader-bar-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.6s ease; }
    .leader-count { font-size: 13px; color: var(--muted); flex-shrink: 0; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 24px; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-card { background: var(--surface); border-radius: 20px; padding: 32px; max-width: 440px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .modal-card h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .modal-card .modal-body { font-size: 14px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

    /* MISC */
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 60px 24px; color: var(--muted); }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { font-size: 15px; }
    .section-title { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 16px; color: var(--accent); }
    .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge-pending { background: #fff8e6; color: #b07d00; border: 1px solid #f0d680; }

    @media (max-width: 600px) {
      .navbar { padding: 0 16px; }
      .auth-card { padding: 32px 20px; }
      .recipient-select { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .pending-card { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
<div id="app">
  <div class="auth-wrap">
    <div style="text-align:center;color:var(--muted)">
      <div class="spinner" style="border-top-color:var(--gold);border-color:var(--border)"></div>
      <p style="margin-top:12px;font-size:14px">Đang khởi động...</p>
    </div>
  </div>
</div>
<div id="modal-root"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, query, orderBy, onSnapshot, updateDoc, deleteDoc, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

// ══════════════════════════════════════════════════
//  🔧 THAY FIREBASE CONFIG CỦA BẠN VÀO ĐÂY
// ══════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyBH3Nxhlc4DUa5ep8DjTAINNgdFNUwVN2Y",
  authDomain: "threeolock-4b3ab.firebaseapp.com",
  projectId: "threeolock-4b3ab",
  storageBucket: "threeolock-4b3ab.firebasestorage.app",
  messagingSenderId: "488099202062",
  appId: "1:488099202062:web:39da95997030face83285f"
};
// ══════════════════════════════════════════════════

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);
const storage = getStorage(fbApp);

// ── STATE ──────────────────────────────────────────
let currentUser = null;
let currentProfile = null;
let allUsers = [];
let selectedRecipient = null;
let uploadedImgFile = null;
let todayThankedUIDs = [];

// ── HELPERS ────────────────────────────────────────
const $  = id => document.getElementById(id);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const initials = name => name ? name.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2) : '?';
const todayKey = () => new Date().toISOString().split('T')[0];
const timeAgo = ts => {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const s = Math.floor((Date.now()-d)/1000);
  if (s < 60) return 'Vừa xong';
  if (s < 3600) return Math.floor(s/60)+' phút trước';
  if (s < 86400) return Math.floor(s/3600)+' giờ trước';
  return Math.floor(s/86400)+' ngày trước';
};

// ── ALERT & TOAST ──────────────────────────────────
function showAlert(id, msg, type) {
  const el = $(id); if (!el) return;
  el.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  if (type !== 'info') setTimeout(()=>{ if(el) el.innerHTML=''; }, 4000);
}
function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:999;background:var(--accent);color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,0.2);animation:fadeUp 0.3s ease;';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}

// ── MODAL ──────────────────────────────────────────
function showModal({ title, body, confirmLabel, danger, onConfirm }) {
  const root = $('modal-root'); if (!root) return;
  root.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)_closeModal()">
      <div class="modal-card">
        <h3>${esc(title)}</h3>
        <div class="modal-body">${body}</div>
        <div class="modal-actions">
          <button class="btn btn-outline btn-sm" onclick="_closeModal()">Hủy</button>
          <button class="btn btn-sm" style="${danger?'background:var(--danger);color:#fff;border:none':'background:var(--accent);color:#fff'}" onclick="_confirmModal()">${esc(confirmLabel)}</button>
        </div>
      </div>
    </div>`;
  window._pendingConfirm = onConfirm;
}
window._closeModal = () => { const r=$('modal-root'); if(r) r.innerHTML=''; window._pendingConfirm=null; };
window._confirmModal = async () => { if(window._pendingConfirm) await window._pendingConfirm(); window._closeModal(); };

// ══════════════════════════════════════════════════
//  AUTH SCREENS
// ══════════════════════════════════════════════════
function renderAuth(tab='login') {
  $('app').innerHTML = `
    <div class="auth-wrap">
      <div class="auth-card">
        <div class="auth-logo">
          <h1>THREE <span>O'CLOCK</span></h1>
          <p>Hệ thống lời cảm ơn nội bộ</p>
        </div>
        <div class="auth-tabs">
          <button class="auth-tab ${tab==='login'?'active':''}" onclick="_authTab('login')">Đăng nhập</button>
          <button class="auth-tab ${tab==='register'?'active':''}" onclick="_authTab('register')">Đăng ký</button>
        </div>
        <div id="auth-alert"></div>
        ${tab==='login' ? `
          <div class="form-group"><label>Email</label><input type="email" id="l-email" placeholder="ten@threeclock.com"/></div>
          <div class="form-group"><label>Mật khẩu</label><input type="password" id="l-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')_login()"/></div>
          <button class="btn btn-primary" onclick="_login()" style="margin-top:8px">Đăng nhập</button>
        ` : `
          <div class="form-group"><label>Họ và tên</label><input type="text" id="r-name" placeholder="Nguyễn Văn A"/></div>
          <div class="form-group"><label>Email</label><input type="email" id="r-email" placeholder="ten@threeclock.com"/></div>
          <div class="form-group">
            <label>Chi nhánh</label>
            <select id="r-branch">
              <option value="">-- Chọn chi nhánh --</option>
              <option>Chi nhánh Quận 1</option><option>Chi nhánh Quận 3</option>
              <option>Chi nhánh Quận 7</option><option>Chi nhánh Bình Thạnh</option>
              <option>Chi nhánh Gò Vấp</option><option>Chi nhánh Tân Bình</option>
              <option>Văn phòng</option>
            </select>
          </div>
          <div class="form-group"><label>Mật khẩu</label><input type="password" id="r-pass" placeholder="Ít nhất 6 ký tự"/></div>
          <div class="alert alert-info" style="margin-bottom:16px">⏳ Tài khoản cần admin duyệt trước khi sử dụng.</div>
          <button class="btn btn-primary" onclick="_register()">Tạo tài khoản</button>
        `}
      </div>
    </div>`;
}
window._authTab = t => renderAuth(t);

window._login = async () => {
  const email = $('l-email')?.value.trim();
  const pass  = $('l-pass')?.value;
  if (!email||!pass) return showAlert('auth-alert','Vui lòng điền đầy đủ.','error');
  showAlert('auth-alert','<span class="spinner"></span> Đang đăng nhập...','info');
  try { await signInWithEmailAndPassword(auth, email, pass); }
  catch { showAlert('auth-alert','Email hoặc mật khẩu không đúng.','error'); }
};

window._register = async () => {
  const name   = $('r-name')?.value.trim();
  const email  = $('r-email')?.value.trim();
  const branch = $('r-branch')?.value;
  const pass   = $('r-pass')?.value;
  if (!name||!email||!branch||!pass) return showAlert('auth-alert','Vui lòng điền đầy đủ.','error');
  if (pass.length<6) return showAlert('auth-alert','Mật khẩu ít nhất 6 ký tự.','error');
  showAlert('auth-alert','<span class="spinner"></span> Đang tạo tài khoản...','info');
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await setDoc(doc(db,'users',cred.user.uid), { uid:cred.user.uid, name, email, branch, status:'pending', role:'employee', createdAt:serverTimestamp() });
    showAlert('auth-alert','✅ Đăng ký thành công! Chờ admin duyệt nhé.','success');
  } catch(e) {
    showAlert('auth-alert', e.code==='auth/email-already-in-use'?'Email này đã được sử dụng.':'Lỗi: '+e.message, 'error');
  }
};

// ── PENDING ────────────────────────────────────────
function renderPending() {
  $('app').innerHTML = `
    <div class="auth-wrap">
      <div class="auth-card" style="text-align:center">
        <div class="auth-logo"><h1>THREE <span>O'CLOCK</span></h1></div>
        <div style="font-size:48px;margin:16px 0">⏳</div>
        <h3 style="font-size:18px;margin-bottom:10px">Tài khoản đang chờ duyệt</h3>
        <p style="font-size:14px;color:var(--muted);margin-bottom:24px">Xin chào <strong>${esc(currentProfile?.name)}</strong>!<br>Admin sẽ duyệt sớm nhất có thể.</p>
        <button class="btn btn-outline" onclick="_logout()">Đăng xuất</button>
      </div>
    </div>`;
}

// ══════════════════════════════════════════════════
//  EMPLOYEE HOME
// ══════════════════════════════════════════════════
async function renderHome() {
  $('app').innerHTML = `
    <nav class="navbar">
      <div class="brand">THREE <span>O'CLOCK</span></div>
      <div class="nav-right">
        <span class="nav-user">Xin chào, <strong>${esc(currentProfile.name)}</strong></span>
        <button class="btn btn-outline btn-sm" onclick="_logout()">Đăng xuất</button>
      </div>
    </nav>
    <div class="main">
      <div class="page-header">
        <div><h2>Bảng lời cảm ơn</h2><p>Gửi lòng biết ơn đến đồng nghiệp 💛</p></div>
      </div>
      <div class="compose-card">
        <h3>✍️ Gửi lời cảm ơn hôm nay</h3>
        <div id="compose-alert"></div>
        <div class="form-group">
          <label>Gửi đến</label>
          <div class="recipient-select" id="recipient-list"><div style="color:var(--muted);font-size:13px;padding:8px">Đang tải...</div></div>
          <div id="selected-label" style="font-size:13px;color:var(--gold);margin-top:6px;font-weight:600;min-height:18px"></div>
        </div>
        <div class="form-group">
          <label>Lời nhắn</label>
          <textarea id="thank-msg" placeholder="Viết lời cảm ơn của bạn..."></textarea>
        </div>
        <div class="form-group">
          <label>Hình ảnh (tuỳ chọn)</label>
          <div class="img-upload-area" onclick="document.getElementById('img-inp').click()">
            <p>📷 Nhấn để chọn ảnh</p>
            <img id="img-prev" class="img-preview" style="display:none"/>
          </div>
          <input type="file" id="img-inp" accept="image/*" style="display:none" onchange="_previewImg(this)"/>
        </div>
        <button class="btn btn-gold" id="send-btn" onclick="_sendThank()">💛 Gửi lời cảm ơn</button>
      </div>
      <h3 class="section-title">Lời cảm ơn gần đây</h3>
      <div id="feed" class="feed"><div class="empty-state"><div class="icon">💬</div><p>Đang tải...</p></div></div>
    </div>`;
  selectedRecipient = null; uploadedImgFile = null;
  await loadRecipients();
  loadFeed(false);
}

async function loadRecipients() {
  const today = todayKey();
  const q = query(collection(db,'thanks'), where('fromUid','==',currentUser.uid), where('todayKey','==',today));
  const snap = await getDocs(q);
  todayThankedUIDs = snap.docs.map(d=>d.data().toUid);
  const list = $('recipient-list'); if (!list) return;
  const others = allUsers.filter(u=>u.uid!==currentUser.uid && u.status==='active');
  if (!others.length) { list.innerHTML='<div style="color:var(--muted);font-size:13px;padding:8px">Chưa có nhân viên nào.</div>'; return; }
  list.innerHTML = others.map(u => {
    const done = todayThankedUIDs.includes(u.uid);
    const safeName = esc(u.name).replace(/'/g, "\\'");
    const clickAttr = done ? '' : ('onclick="_pick(\'' + u.uid + '\',\'' + safeName + '\')"');
    const titleAttr = done ? 'Đã cảm ơn hôm nay' : esc(u.branch);
    const checkmark = done ? '<span style="font-size:10px;margin-left:auto">✓</span>' : '';
    return '<div class="recipient-chip ' + (done ? 'already-thanked' : '') + '" id="chip-' + u.uid + '" ' + clickAttr + ' title="' + titleAttr + '">'
      + '<div class="avatar-xs">' + initials(u.name) + '</div>'
      + '<span>' + esc(u.name) + '</span>' + checkmark
      + '</div>';
  }).join('');
}

window._pick = (uid, name) => {
  selectedRecipient = { uid, name };
  document.querySelectorAll('.recipient-chip').forEach(c=>c.classList.remove('selected'));
  const c = $('chip-'+uid); if(c) c.classList.add('selected');
  $('selected-label').textContent = '✓ Đã chọn: '+name;
};

window._previewImg = inp => {
  const file = inp.files[0]; if (!file) return;
  uploadedImgFile = file;
  const r = new FileReader();
  r.onload = e => { const el=$('img-prev'); el.src=e.target.result; el.style.display='block'; };
  r.readAsDataURL(file);
};

window._sendThank = async () => {
  if (!selectedRecipient) return showAlert('compose-alert','Vui lòng chọn người nhận.','error');
  const msg = $('thank-msg')?.value.trim();
  if (!msg) return showAlert('compose-alert','Vui lòng viết lời nhắn.','error');
  if (todayThankedUIDs.includes(selectedRecipient.uid)) return showAlert('compose-alert','Bạn đã cảm ơn người này hôm nay rồi.','error');
  const btn = $('send-btn'); btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Đang gửi...';
  try {
    let imgUrl = null;
    if (uploadedImgFile) {
      const r = ref(storage,`thanks/${Date.now()}_${uploadedImgFile.name}`);
      await uploadBytes(r, uploadedImgFile);
      imgUrl = await getDownloadURL(r);
    }
    await addDoc(collection(db,'thanks'), {
      fromUid:currentUser.uid, fromName:currentProfile.name, fromBranch:currentProfile.branch,
      toUid:selectedRecipient.uid, toName:selectedRecipient.name,
      message:msg, imgUrl, todayKey:todayKey(),
      createdAt:serverTimestamp(), deleted:false, deletedReason:null
    });
    showAlert('compose-alert','💛 Đã gửi thành công!','success');
    $('thank-msg').value=''; $('img-prev').style.display='none';
    uploadedImgFile=null; selectedRecipient=null; $('selected-label').textContent='';
    await loadRecipients();
  } catch(e) { showAlert('compose-alert','Lỗi: '+e.message,'error'); }
  btn.disabled=false; btn.innerHTML='💛 Gửi lời cảm ơn';
};

// ══════════════════════════════════════════════════
//  FEED (shared)
// ══════════════════════════════════════════════════
function loadFeed(isAdmin) {
  const feedId = isAdmin ? 'admin-feed' : 'feed';
  const q = query(collection(db,'thanks'), orderBy('createdAt','desc'));
  onSnapshot(q, snap => {
    const el = $(feedId); if (!el) return;
    const docs = snap.docs.map(d=>({id:d.id,...d.data()}));
    if (!docs.length) { el.innerHTML=`<div class="empty-state"><div class="icon">💛</div><p>Chưa có lời cảm ơn nào.</p></div>`; return; }
    el.innerHTML = docs.map(d=>cardHTML(d,isAdmin)).join('');
  });
}

function cardHTML(d, isAdmin) {
  if (d.deleted) return `
    <div class="thank-card deleted">
      <div class="card-header">
        <div class="card-people">
          <div class="avatar">${initials(d.fromName)}</div>
          <div class="card-names"><span class="from-n">${esc(d.fromName)}</span><span class="arrow">→</span><span class="to-n">${esc(d.toName)}</span></div>
        </div>
        <div class="card-time">${timeAgo(d.createdAt)}</div>
      </div>
      <div class="deleted-notice">🗑️ Đã bị xóa bởi admin${d.deletedReason?': '+esc(d.deletedReason):'.'}</div>
    </div>`;
  return `
    <div class="thank-card">
      <div class="card-header">
        <div class="card-people">
          <div class="avatar">${initials(d.fromName)}</div>
          <div class="card-names"><span class="from-n">${esc(d.fromName)}</span><span class="arrow">→</span><span class="to-n">${esc(d.toName)}</span></div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="card-time">${timeAgo(d.createdAt)}</div>
          ${isAdmin?`<button class="btn btn-danger btn-sm" onclick="_adminDelete('${d.id}','${esc(d.fromName)}','${esc(d.toName)}')">Xóa</button>`:''}
        </div>
      </div>
      ${d.imgUrl?`<img src="${d.imgUrl}" class="card-img" alt="ảnh"/>`:''}
      <div class="card-message">"${esc(d.message)}"</div>
      <div class="card-footer"><span class="card-branch">📍 ${esc(d.fromBranch||'')}</span></div>
    </div>`;
}

// ══════════════════════════════════════════════════
//  ADMIN
// ══════════════════════════════════════════════════
function renderAdmin() {
  $('app').innerHTML = `
    <nav class="navbar">
      <div class="brand">THREE <span>O'CLOCK</span> <span style="font-size:12px;font-family:'DM Sans';font-weight:600;margin-left:8px;color:var(--gold)">ADMIN</span></div>
      <div class="nav-right">
        <span class="nav-user"><strong>${esc(currentProfile.name)}</strong></span>
        <button class="btn btn-outline btn-sm" onclick="_logout()">Đăng xuất</button>
      </div>
    </nav>
    <div class="main">
      <div class="tabs">
        <button class="tab active" id="tab-pending" onclick="_aTab('pending')">Duyệt tài khoản</button>
        <button class="tab" id="tab-feed" onclick="_aTab('feed')">Lời cảm ơn</button>
        <button class="tab" id="tab-stats" onclick="_aTab('stats')">Thống kê</button>
      </div>
      <div id="admin-content"></div>
    </div>`;
  window._aTab('pending');
}

window._aTab = tab => {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const el=$(`tab-${tab}`); if(el) el.classList.add('active');
  if(tab==='pending') renderPendingList();
  if(tab==='feed')    renderAdminFeed();
  if(tab==='stats')   renderAdminStats();
};

async function renderPendingList() {
  const c=$('admin-content'); c.innerHTML='<div class="empty-state"><p>Đang tải...</p></div>';
  const snap = await getDocs(query(collection(db,'users'), where('status','==','pending')));
  const list = snap.docs.map(d=>d.data());
  if (!list.length) { c.innerHTML=`<div class="empty-state"><div class="icon">✅</div><p>Không có tài khoản nào chờ duyệt.</p></div>`; return; }
  c.innerHTML = `
    <h3 class="section-title">Chờ duyệt (${list.length})</h3>
    <div style="display:flex;flex-direction:column;gap:10px">
      ${list.map(u=>`
        <div class="pending-card" id="pc-${u.uid}">
          <div style="display:flex;align-items:center;gap:14px">
            <div class="avatar">${initials(u.name)}</div>
            <div class="pending-info"><h4>${esc(u.name)}</h4><p>${esc(u.email)} · ${esc(u.branch)}</p></div>
          </div>
          <div class="pending-actions">
            <span class="badge badge-pending">Chờ duyệt</span>
            <button class="btn btn-approve btn-sm" onclick="_approve('${u.uid}')">✓ Duyệt</button>
            <button class="btn btn-danger btn-sm" onclick="_reject('${u.uid}','${esc(u.name)}')">✗ Từ chối</button>
          </div>
        </div>`).join('')}
    </div>`;
}

window._approve = async uid => {
  await updateDoc(doc(db,'users',uid),{status:'active'});
  allUsers = allUsers.map(u=>u.uid===uid?{...u,status:'active'}:u);
  const c=$('pc-'+uid); if(c) c.remove();
  showToast('✅ Đã duyệt tài khoản');
};

window._reject = (uid, name) => {
  showModal({ title:'Từ chối tài khoản', body:`Bạn có chắc muốn từ chối tài khoản của <strong>${name}</strong>? Hành động này không thể hoàn tác.`,
    confirmLabel:'Từ chối', danger:true,
    onConfirm: async () => {
      await deleteDoc(doc(db,'users',uid));
      allUsers = allUsers.filter(u=>u.uid!==uid);
      const c=$('pc-'+uid); if(c) c.remove();
      showToast('Đã từ chối tài khoản');
    }
  });
};

function renderAdminFeed() {
  const c=$('admin-content');
  c.innerHTML=`<h3 class="section-title">Tất cả lời cảm ơn</h3><div id="admin-feed" class="feed"><div class="empty-state"><p>Đang tải...</p></div></div>`;
  loadFeed(true);
}

window._adminDelete = (id, fromName, toName) => {
  showModal({
    title:'Xóa lời cảm ơn',
    body:`Xóa bài của <strong>${fromName}</strong> → <strong>${toName}</strong>?<br><br>
      <label style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Lý do xóa</label>
      <textarea id="del-reason" style="width:100%;margin-top:6px;padding:10px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:14px;resize:none;background:var(--bg);outline:none" rows="3" placeholder="Nhập lý do (bắt buộc)..."></textarea>`,
    confirmLabel:'Xóa bài', danger:true,
    onConfirm: async () => {
      const reason = $('del-reason')?.value.trim() || 'Vi phạm nội quy';
      await updateDoc(doc(db,'thanks',id), { deleted:true, deletedReason:reason });
      showToast('🗑️ Đã xóa bài');
    }
  });
};

async function renderAdminStats() {
  const c=$('admin-content'); c.innerHTML='<div class="empty-state"><p>Đang tải thống kê...</p></div>';
  const snap = await getDocs(collection(db,'thanks'));
  const all = snap.docs.map(d=>d.data()).filter(d=>!d.deleted);
  const today = todayKey();
  const tally = {};
  all.forEach(d=>{ tally[d.toUid]=tally[d.toUid]||{name:d.toName,count:0}; tally[d.toUid].count++; });
  const leaders = Object.values(tally).sort((a,b)=>b.count-a.count).slice(0,10);
  const max = leaders[0]?.count || 1;
  c.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="num">${all.length}</div><div class="label">Tổng lời cảm ơn</div></div>
      <div class="stat-card"><div class="num">${allUsers.filter(u=>u.status==='active').length}</div><div class="label">Nhân viên active</div></div>
      <div class="stat-card"><div class="num">${all.filter(d=>d.todayKey===today).length}</div><div class="label">Hôm nay</div></div>
      <div class="stat-card"><div class="num">${allUsers.filter(u=>u.status==='pending').length}</div><div class="label">Chờ duyệt</div></div>
    </div>
    <h3 class="section-title">🏆 Top nhân viên được cảm ơn nhiều nhất</h3>
    <div class="leaderboard">
      ${!leaders.length?'<div class="empty-state"><p>Chưa có dữ liệu.</p></div>':
        leaders.map((l,i)=>`
          <div class="leader-row">
            <div class="leader-rank">${i+1}</div>
            <div class="avatar">${initials(l.name)}</div>
            <div class="leader-bar-wrap">
              <div class="leader-name">${esc(l.name)}</div>
              <div class="leader-bar-bg"><div class="leader-bar-fill" style="width:${(l.count/max*100).toFixed(0)}%"></div></div>
            </div>
            <div class="leader-count">${l.count} lần</div>
          </div>`).join('')}
    </div>`;
}

// ══════════════════════════════════════════════════
//  LOGOUT & AUTH STATE
// ══════════════════════════════════════════════════
window._logout = () => signOut(auth);

onAuthStateChanged(auth, async user => {
  if (!user) { currentUser=null; currentProfile=null; renderAuth('login'); return; }
  currentUser = user;
  const snap = await getDoc(doc(db,'users',user.uid));
  if (!snap.exists()) { await signOut(auth); return; }
  currentProfile = snap.data();
  const uSnap = await getDocs(collection(db,'users'));
  allUsers = uSnap.docs.map(d=>d.data());
  if (currentProfile.status==='pending') renderPending();
  else if (currentProfile.role==='admin') renderAdmin();
  else renderHome();
});

// ── Set admin (dùng 1 lần) ─────────────────────────
// Mở console, gõ: _makeAdmin()  sau khi đăng nhập bằng tài khoản admin
window._makeAdmin = async () => {
  if (!currentUser) return alert('Chưa đăng nhập!');
  await updateDoc(doc(db,'users',currentUser.uid),{role:'admin',status:'active'});
  alert('✅ Done! Reload lại trang.');
};
</script>
</body>
</html>
